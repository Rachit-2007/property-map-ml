<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b);
        }

        .auth-card{
            width:400px;
            background:white;
            padding:40px;
            border-radius:16px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        .auth-card h1{
            text-align:center;
            margin-bottom:10px;
            color:#111827;
            font-size:36px;
        }

        .subtitle{
            text-align:center;
            color:gray;
            margin-bottom:30px;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group input{
            width:100%;
            padding:14px;
            border:1px solid #d1d5db;
            border-radius:10px;
            font-size:16px;
            outline:none;
        }

        .input-group input:focus{
            border-color:#2563eb;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        .bottom-text{
            margin-top:20px;
            text-align:center;
        }

        .bottom-text a{
            color:#2563eb;
            text-decoration:none;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="auth-card">

    <h1>Create Account</h1>

    <p class="subtitle">Signup to continue</p>

    <form method="POST">

        {% csrf_token %}
        
        <div class="input-group">
            <input type="text" name="username" placeholder="Username" required>
        </div>

        <div class="input-group">
            <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit">Signup</button>

    </form>

    <p class="bottom-text">
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </p>

</div>

</body>
</html>
